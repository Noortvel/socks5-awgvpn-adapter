services:
  socks5-vpn:
    build: .
    container_name: socks5-amneziawg
    ports:
      - "1080:1080"
    environment:
      - SOCKS_PORT=1080
      # - SOCKS_USER=user
      # - SOCKS_PASS=pass
    volumes:
      - ./awg0.conf:/etc/amneziawg/awg0.conf:ro
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      # BBR не реагирует на потерю пакетов снижением throughput —
      # критически важно для VPN-туннелей, где потеря = rekey, а не перегрузка.
      # Работает если модуль tcp_bbr загружен на хосте (modprobe tcp_bbr),
      # иначе fallback на cubic.
      - net.ipv4.tcp_congestion_control=bbr
      # MTU probing: 1 = probe only on black hole (maxseg 1380 уже ограничивает MSS)
      - net.ipv4.tcp_mtu_probing=1
      - net.ipv4.tcp_fastopen=3
      - net.ipv4.tcp_window_scaling=1
      - net.ipv4.tcp_sack=1
      - net.ipv4.tcp_timestamps=1
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.tcp_keepalive_time=60
      - net.ipv4.tcp_keepalive_intvl=10
      - net.ipv4.tcp_keepalive_probes=6
      # TCP буферы: 12MB max позволяет BBR заполнить BDP до 500Mbps × 200ms.
      # Auto-tuning выделяет только нужное — не все 12MB одновременно.
      # Initial 128KB (быстрее ramp-up) vs дефолт 87KB
      - net.ipv4.tcp_rmem=4096 131072 12582912
      - net.ipv4.tcp_wmem=4096 131072 12582912
      # === Streaming optimizations ===
      # НЕ сбрасывать congestion window после idle — критично для YouTube/видео,
      # где плеер скачивает сегменты с паузами между ними.
      # Без этого: после паузы следующий сегмент скачивается на минимальной скорости.
      - net.ipv4.tcp_slow_start_after_idle=0
      # НЕ кешировать TCP метрики (cwnd, RTT) между соединениями.
      # Для VPN: закешированные метрики быстрого direct-пути могут ограничить
      # throughput через медленный VPN-туннель
      - net.ipv4.tcp_no_metrics_save=1
      # Переиспользование TIME_WAIT сокетов — ускоряет переработку соединений
      # при burst-запросах к CDN (изображения, видео-сегменты)
      - net.ipv4.tcp_tw_reuse=1
      # Увеличиваем backlog входящих соединений (защита от SYN flood + burst)
      - net.core.somaxconn=1024
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 1G
        reservations:
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1080 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
